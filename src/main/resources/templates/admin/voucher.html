<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Voucher Management</title>
    <link rel="stylesheet" th:href="@{/css/voucher.css}">
</head>
<body>

<div class="header">
    <div class="logo">
        <img th:src="@{/images/logo.jpg}">
    </div>
    <div class="nav">
        <a href="/admin/home">Home</a>
        <a href="/admin/category">Category</a>
        <a href="/admin/product">Product</a>
        <a href="/admin/order">Order</a>
        <a href="/admin/customer">Customer</a>
        <a href="/admin/voucher" class="active">Voucher</a>
        <a href="/admin/banner">Banner</a>
    </div>
    <div class="right-header">
        <span>Hi Admin</span>
        <form method="post" action="/logout"><button class="logout">Logout</button></form>
    </div>
</div>

<h2 class="title">Voucher Management</h2>

<div class="container">
    <div class="left">
        <h3 class="title">Voucher List</h3>
        <table>
            <tr>
                <th>Code</th>
                <th>Title</th>
                <th>Discount</th>
                <th>Min Order</th>
                <th>Color</th>
            </tr>
            <tr th:each="v : ${vouchers}"
                th:attr="data-id=${v.id}, data-code=${v.code}, data-title=${v.title}, data-discount=${v.discount}, data-min=${v.minAmount}, data-desc=${v.description}, data-color=${v.color}"
                onclick="selectVoucher(this)" style="cursor: pointer;">
                <td th:text="${v.code}" style="font-weight: bold; color: #4a90e2;"></td>
                <td th:text="${v.title}"></td>
                <td th:text="${#numbers.formatDecimal(v.discount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${#numbers.formatDecimal(v.minAmount, 0, 'COMMA', 0, 'POINT')}"></td>
                <td><span th:text="${v.color}" th:style="'background:' + (${v.color == 'blue'} ? '#5da2f0' : '#ff9b71') + '; padding: 3px 8px; border-radius: 4px; color: white; font-size: 12px;'"></span></td>
            </tr>
        </table>
    </div>

    <div class="right">
        <h3 class="title">Voucher Detail</h3>
        <form th:action="@{/admin/voucher/save}" method="post">
            <input type="hidden" id="id" name="id">

            <label>Mã Code (VD: BABYHOME)</label>
            <input type="text" id="code" name="code" required>

            <label>Tiêu đề (VD: Giảm 50.000đ)</label>
            <input type="text" id="title" name="title" required>

            <label>Tiền giảm (VNĐ - Freeship thì nhập 0)</label>
            <input type="number" id="discount" name="discount" required>

            <label>Đơn tối thiểu (VNĐ)</label>
            <input type="number" id="minAmount" name="minAmount" required>

            <label>Mô tả chi tiết</label>
            <input type="text" id="description" name="description" required>

            <label>Màu thẻ Voucher</label>
            <select id="color" name="color">
                <option value="blue">Xanh Dương</option>
                <option value="orange">Cam</option>
            </select>

            <br><br>
            <button type="submit">Lưu Mã</button>
            <button type="button" onclick="deleteVoucher()">Xóa Mã</button>
            <button type="button" onclick="resetForm()">Tạo mới</button>
        </form>
    </div>
</div>

<script>
    function selectVoucher(row) {
        document.getElementById("id").value = row.dataset.id;
        document.getElementById("code").value = row.dataset.code;
        document.getElementById("title").value = row.dataset.title;
        document.getElementById("discount").value = row.dataset.discount;
        document.getElementById("minAmount").value = row.dataset.min;
        document.getElementById("description").value = row.dataset.desc;
        document.getElementById("color").value = row.dataset.color;
    }

    function resetForm() {
        document.getElementById("id").value = "";
        document.getElementById("code").value = "";
        document.getElementById("title").value = "";
        document.getElementById("discount").value = "0";
        document.getElementById("minAmount").value = "0";
        document.getElementById("description").value = "";
    }

    function deleteVoucher() {
        const idVal = document.getElementById("id").value;
        if(!idVal){ alert("Chọn Voucher trước!"); return; }
        if(confirm("Xóa Voucher này?")){ window.location.href = "/admin/voucher/delete/" + idVal; }
    }
</script>
</body>
</html>
