<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Product</title>
    <link rel="stylesheet" href="/css/product.css">
</head>

<body>

<div class="header">
    <div class="logo">
        <img th:src="@{/images/logo.jpg}">
    </div>

    <div class="nav">
        <a href="/admin/category">Category</a>
        <a href="/admin/product">Product</a>
        <a href="/admin/order">Order</a>
        <a href="/admin/customer">Customer</a>
    </div>

    <div class="right-header">
        <span>Hi <span th:text="${#authentication.name}"></span></span>
        <form method="post" action="/logout">
            <button class="logout">Logout</button>
        </form>
    </div>
</div>

<h2 class="title">Product Management</h2>

<div class="container">

    <div class="left">
        <h3 class="title">Product List</h3>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Colors</th>
            </tr>

            <tr th:each="p : ${products}"
                th:attr="
                    data-id=${p.id},
                    data-name=${p.name},
                    data-price=${p.price},
                    data-image=${p.image},
                    data-color=${p.color},
                    data-size=${p.size},
                    data-gender=${p.gender},
                    data-category=${p.category != null ? p.category.id : ''}"
                onclick="selectProduct(this)">

                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td>
                    <div style="display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; max-width: 80px;">
                        <span th:if="${p.color != null and !p.color.isEmpty()}"
                              th:each="c : ${#strings.arraySplit(p.color, '|')}"
                              th:style="'background-color: ' + ${c} + '; width: 15px; height: 15px; border: 1px solid #ccc; border-radius: 50%;'">
                        </span>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="right">
        <h3 class="title">Product Detail</h3>

        <form method="post">
            <label>ID</label>
            <input type="text" id="id" name="id" readonly placeholder="Auto (Leave blank to Add)">

            <label>Name</label>
            <input type="text" id="name" name="name" required>

            <label>Price</label>
            <input type="number" id="price" name="price" required>

            <label>Image</label>
            <button type="button" onclick="openImageModal()">Chọn ảnh</button>
            <input type="hidden" id="image" name="image">
            <img id="preview">

            <label>Color</label>
            <button type="button" onclick="openColorModal()">Chọn màu</button>
            <input type="hidden" id="color" name="color">
            <div id="colorPreview"></div>

            <label>Size</label>
            <button type="button" onclick="openSizeModal()">Chọn Size</button>
            <input type="hidden" id="size" name="size">
            <div id="sizePreview" style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;"></div>

            <label>Gender</label>
            <select id="gender" name="gender">
                <option value="boy">Boy</option>
                <option value="girl">Girl</option>
            </select>

            <label>Category</label>
            <select id="category" name="categoryId">
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>

            <br><br>

            <button type="submit" formaction="/admin/product/add">Add</button>
            <button type="submit" formaction="/admin/product/update">Update</button>
            <button type="button" onclick="deleteProduct()">Delete</button>
        </form>
    </div>

</div>

<div id="imageModal" class="modal">
    <div class="modal-content large">
        <h3>Chọn ảnh</h3>
        <div id="dropZone" class="drop-zone">
            <p>Kéo & thả ảnh vào đây hoặc click để chọn</p>
            <input type="file" id="fileInput" hidden>
            <img id="imgPreview">
        </div>
        <br>
        <div class="btn-group">
            <button onclick="saveImage()">Lưu</button>
            <button onclick="closeImageModal()">Huỷ</button>
        </div>
    </div>
</div>

<div id="colorModal" class="modal">
    <div class="modal-content">
        <h3>Chọn màu</h3>
        <div class="color-grid" id="colorGrid"></div>
        <br>
        <div class="btn-group">
            <button onclick="saveColor()">Lưu</button>
            <button onclick="closeColorModal()">Huỷ</button>
        </div>
    </div>
</div>

<div id="sizeModal" class="modal">
    <div class="modal-content" style="width: 450px;">
        <h3>Chọn Size</h3>
        <div id="sizeGrid" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px;">
        </div>
        <br>
        <div class="btn-group">
            <button onclick="saveSize()">Lưu</button>
            <button onclick="closeSizeModal()">Huỷ</button>
        </div>
    </div>
</div>

<script>
    let selectedColors = [];
    let selectedSizes = [];

    // Danh sách size tiêu chuẩn
    const sizeList = [
        "2Y-11-12kg", "4Y-14-16kg", "6Y-19-21kg",
        "8Y-23-25kg", "10Y-27-31kg", "12Y-33-35kg"
    ];

    /* ===== CHỌN SẢN PHẨM TỪ LIST ===== */
    function selectProduct(row){
        document.getElementById("id").value = row.dataset.id || "";
        document.getElementById("name").value = row.dataset.name || "";
        document.getElementById("price").value = row.dataset.price || "";
        document.getElementById("image").value = row.dataset.image || "";
        document.getElementById("gender").value = row.dataset.gender || "boy";
        document.getElementById("category").value = row.dataset.category || "";

        // Xử lý ảnh
        const preview = document.getElementById("preview");
        if(row.dataset.image){
            preview.src = "/images/products/" + row.dataset.image;
            preview.style.display = "block";
        } else {
            preview.style.display = "none";
        }

        // Xử lý màu sắc
        const colorInput = document.getElementById("color");
        if(row.dataset.color){
            colorInput.value = row.dataset.color;
            selectedColors = row.dataset.color.split("|");
        } else {
            colorInput.value = "";
            selectedColors = [];
        }

        // Xử lý Size
        const sizeInput = document.getElementById("size");
        if(row.dataset.size){
            sizeInput.value = row.dataset.size;
            selectedSizes = row.dataset.size.split("|");
        } else {
            sizeInput.value = "";
            selectedSizes = [];
        }

        renderColorPreview();
        renderSizePreview();
    }

    /* ===== HIỂN THỊ PREVIEW ===== */
    function renderColorPreview() {
        const colorPreview = document.getElementById("colorPreview");
        colorPreview.innerHTML = "";
        selectedColors.forEach(c => {
            if(c.trim() !== "") {
                const swatch = document.createElement("div");
                swatch.className = "preview-swatch";
                swatch.style.background = c;
                colorPreview.appendChild(swatch);
            }
        });
    }

    function renderSizePreview() {
        const sizePreview = document.getElementById("sizePreview");
        sizePreview.innerHTML = "";
        selectedSizes.forEach(s => {
            if(s.trim() !== "") {
                const tag = document.createElement("div");
                tag.className = "preview-size-tag";
                tag.innerText = s;
                sizePreview.appendChild(tag);
            }
        });
    }

    /* ===== CHUẨN BỊ LƯỚI SIZE TRONG MODAL ===== */
    const sizeGrid = document.getElementById("sizeGrid");
    sizeList.forEach(s => {
        const btn = document.createElement("div");
        btn.className = "size-item";
        btn.innerText = s;
        btn.dataset.val = s;

        btn.onclick = () => {
            if(btn.classList.contains("selected")){
                btn.classList.remove("selected");
                selectedSizes = selectedSizes.filter(x => x !== s);
            } else {
                btn.classList.add("selected");
                selectedSizes.push(s);
            }
        };
        sizeGrid.appendChild(btn);
    });

    function updateSizeGridVisuals() {
        document.querySelectorAll(".size-item").forEach(item => {
            if(selectedSizes.includes(item.dataset.val)){
                item.classList.add("selected");
            } else {
                item.classList.remove("selected");
            }
        });
    }

    function saveSize(){
        const sizeInput = document.getElementById("size");
        if(selectedSizes.length > 0){
            sizeInput.value = selectedSizes.join("|");
        } else {
            sizeInput.value = "";
        }
        renderSizePreview();
        closeSizeModal();
    }

    function openSizeModal(){
        updateSizeGridVisuals();
        document.getElementById("sizeModal").style.display = "flex";
    }
    function closeSizeModal(){ document.getElementById("sizeModal").style.display = "none"; }

    /* ===== MODAL MÀU SẮC (GIỮ NGUYÊN) ===== */
    const colors = [];
    const steps = [0, 51, 102, 153, 204, 255];
    for(let r of steps){ for(let g of steps){ for(let b of steps){ colors.push(`rgb(${r},${g},${b})`); } } }

    const colorGrid = document.getElementById("colorGrid");
    colors.forEach(c => {
        const div = document.createElement("div");
        div.className = "color-item";
        div.style.background = c;
        div.dataset.val = c;

        div.onclick = () => {
            if(div.classList.contains("selected")){
                div.classList.remove("selected");
                selectedColors = selectedColors.filter(x => x !== c);
            } else {
                div.classList.add("selected");
                selectedColors.push(c);
            }
        };
        colorGrid.appendChild(div);
    });

    function updateColorGridVisuals() {
        document.querySelectorAll(".color-item").forEach(item => {
            if(selectedColors.includes(item.dataset.val)){ item.classList.add("selected"); }
            else { item.classList.remove("selected"); }
        });
    }

    function saveColor(){
        const colorInput = document.getElementById("color");
        if(selectedColors.length > 0){ colorInput.value = selectedColors.join("|"); }
        else { colorInput.value = ""; }
        renderColorPreview();
        closeColorModal();
    }

    function openColorModal(){ updateColorGridVisuals(); document.getElementById("colorModal").style.display = "flex"; }
    function closeColorModal(){ document.getElementById("colorModal").style.display = "none"; }

    /* ===== IMAGE MODAL & KHÁC ===== */
    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");
    const imgPreview = document.getElementById("imgPreview");

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = e => { showPreview(e.target.files[0]); };
    dropZone.ondragover = e => { e.preventDefault(); dropZone.style.background = "#e3f0ff"; };
    dropZone.ondragleave = () => { dropZone.style.background = "#f9fbff"; };
    dropZone.ondrop = e => { e.preventDefault(); fileInput.files = e.dataTransfer.files; showPreview(e.dataTransfer.files[0]); };

    function showPreview(file){
        if(file) { imgPreview.src = URL.createObjectURL(file); imgPreview.style.display = "block"; }
    }

    function saveImage(){
        const file = fileInput.files[0];
        if(file){
            document.getElementById("image").value = file.name;
            const preview = document.getElementById("preview");
            preview.src = URL.createObjectURL(file);
            preview.style.display = "block";
        }
        closeImageModal();
    }

    function openImageModal(){ document.getElementById("imageModal").style.display = "flex"; }
    function closeImageModal(){ document.getElementById("imageModal").style.display = "none"; }

    function deleteProduct(){
        const idVal = document.getElementById("id").value;
        if(!idVal){ alert("Chọn sản phẩm trước!"); return; }
        if(confirm("Xoá sản phẩm?")){ window.location.href = "/admin/product/delete/" + idVal; }
    }

    document.querySelector("button[formaction='/admin/product/add']").onclick = function(e){
        if(document.getElementById("id").value){
            alert("Add không cần ID (hãy để trống trường ID hoặc F5 lại trang để Add mới)");
            e.preventDefault();
        }
    };
</script>

</body>
</html>
