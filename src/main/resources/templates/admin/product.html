<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin - Product</title>
    <link rel="stylesheet" href="/css/product.css">
</head>

<body>

<div class="header">
    <div class="logo">
        <img th:src="@{/images/logo.jpg}">
    </div>

    <div class="nav">
        <a href="/admin/home">Home</a>
        <a href="/admin/category">Category</a>
        <a href="/admin/product" class="active">Product</a>
        <a href="/admin/order">Order</a>
        <a href="/admin/customer">Customer</a>
        <a href="/admin/voucher">Voucher</a>
        <a href="/admin/banner">Banner</a>
    </div>

    <div class="right-header">
        <span>Hi <span th:text="${#authentication.name}"></span></span>
        <form method="post" action="/logout">
            <button class="logout">Logout</button>
        </form>
    </div>
</div>

<h2 class="title">Product Management</h2>

<div class="container">

    <div class="left">
        <h3 class="title">Product List</h3>

        <table>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Colors</th>
            </tr>

            <tr th:each="p : ${products}"
                th:attr="
                    data-id=${p.id},
                    data-name=${p.name},
                    data-price=${p.price},
                    data-image=${p.image},
                    data-color=${p.color},
                    data-size=${p.size},
                    data-gender=${p.gender},
                    data-category=${p.category}"
                onclick="selectProduct(this)">

                <td th:text="${p.id}"></td>
                <td th:text="${p.name}"></td>
                <td th:text="${p.price}"></td>
                <td>
                    <div style="display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; max-width: 80px;">
                        <th:block th:if="${p.color != null and !p.color.isEmpty()}">
                            <th:block th:each="c : ${#strings.arraySplit(p.color, '|')}">
                <span th:with="colorArr=${#strings.arraySplit(c, ':')}"
                      th:style="'background-color: ' + ${colorArr[0]} + '; width: 15px; height: 15px; border: 1px solid #ccc; border-radius: 50%;'"
                      th:title="${#arrays.length(colorArr) > 1 ? colorArr[1] : colorArr[0]}">
                </span>
                            </th:block>
                        </th:block>
                    </div>
                </td>
            </tr>
        </table>
    </div>

    <div class="right">
        <h3 class="title">Product Detail</h3>

        <form method="post" enctype="multipart/form-data">
            <label>ID</label>
            <input type="text" id="id" name="id" readonly placeholder="Auto (Leave blank to Add)">

            <label>Name</label>
            <input type="text" id="name" name="name" required>

            <label>Price</label>
            <input type="number" id="price" name="price" required>

            <label>Image</label>
            <input type="file" id="imageFile" name="imageFile" accept="image/*" style="display: none;" onchange="previewNewImage()">
            <button type="button" onclick="document.getElementById('imageFile').click()">Chọn ảnh (Từ máy tính)</button>

            <input type="hidden" id="image" name="image">
            <img id="preview" style="max-width: 150px; margin-top: 10px; border-radius: 8px; display: none;">

            <label>Color</label>
            <button type="button" onclick="openColorModal()">Chọn màu</button>
            <input type="hidden" id="color" name="color">
            <div id="colorPreview" style="margin-top: 10px;"></div>

            <label>Size</label>
            <button type="button" onclick="openSizeModal()">Chọn Size</button>
            <input type="hidden" id="size" name="size">
            <div id="sizePreview" style="display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px;"></div>

            <label>Gender</label>
            <select id="gender" name="gender">
                <option value="boy">Boy</option>
                <option value="girl">Girl</option>
            </select>

            <label>Category</label>
            <select name="category" id="category">
                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
            </select>

            <br><br>

            <button type="submit" formaction="/admin/product/add">Add</button>
            <button type="submit" formaction="/admin/product/update">Update</button>
            <button type="button" onclick="deleteProduct()">Delete</button>
        </form>
    </div>

</div>

<div id="imageModal" class="modal">
    <div class="modal-content large">
        <h3>Chọn ảnh</h3>
        <div id="dropZone" class="drop-zone" onclick="document.getElementById('fileInput').click()">
            <p>Kéo & thả ảnh vào đây hoặc click để chọn</p>
            <input type="file" id="fileInput" hidden accept="image/*">
            <img id="imgPreview">
        </div>
        <div class="btn-group">
            <button onclick="saveImage()">Lưu</button>
            <button onclick="closeImageModal()">Huỷ</button>
        </div>
    </div>
</div>

<div id="colorModal" class="modal">
    <div class="modal-content" style="width: 550px;">
        <h3>Chọn màu</h3>
        <div class="color-grid" id="colorGrid"></div>
        <div class="btn-group">
            <button onclick="saveColor()">Lưu</button>
            <button onclick="closeColorModal()">Huỷ</button>
        </div>
    </div>
</div>

<div id="sizeModal" class="modal">
    <div class="modal-content" style="width: 450px;">
        <h3>Chọn Size</h3>
        <div id="sizeGrid" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 15px;">
        </div>
        <div class="btn-group">
            <button onclick="saveSize()">Lưu</button>
            <button onclick="closeSizeModal()">Huỷ</button>
        </div>
    </div>
</div>

<script>
    let selectedColors = [];
    let selectedSizes = [];
    let tempImageName = ""; // Lưu giữ tên file ảnh trước khi Save

    // ==========================================
    // 1. LOGIC XỬ LÝ SIZE
    // ==========================================
    const clothingSizes = ["2Y-11-12kg", "4Y-14-16kg", "6Y-19-21kg", "8Y-23-25kg", "10Y-27-31kg", "12Y-33-35kg"];
    const shoeSizes = [
        "Size 25-16cm", "Size 26-16.5cm", "Size 27-17cm", "Size 28-17.5cm",
        "Size 29-18cm", "Size 30-18.5cm", "Size 31-19cm", "Size 32-19.5cm", "Size 33-20cm"
    ];

    function renderSizeGrid() {
        const sizeGrid = document.getElementById("sizeGrid");
        sizeGrid.innerHTML = "";

        const h4Cloth = document.createElement("h4"); h4Cloth.innerText = "Size Quần Áo"; h4Cloth.style.width="100%"; h4Cloth.style.textAlign="center";
        sizeGrid.appendChild(h4Cloth);
        clothingSizes.forEach(s => createSizeBtn(s, sizeGrid));

        const h4Shoe = document.createElement("h4"); h4Shoe.innerText = "Size Giày Dép"; h4Shoe.style.width="100%"; h4Shoe.style.marginTop="20px"; h4Shoe.style.textAlign="center";
        sizeGrid.appendChild(h4Shoe);
        shoeSizes.forEach(s => createSizeBtn(s, sizeGrid));
    }

    function createSizeBtn(s, container) {
        const btn = document.createElement("div");
        btn.className = "size-item";
        btn.innerText = s;
        btn.dataset.val = s;
        btn.onclick = () => {
            if(btn.classList.contains("selected")){
                btn.classList.remove("selected");
                selectedSizes = selectedSizes.filter(x => x !== s);
            } else {
                btn.classList.add("selected");
                selectedSizes.push(s);
            }
        };
        container.appendChild(btn);
    }
    renderSizeGrid();

    function openSizeModal(){
        document.querySelectorAll(".size-item").forEach(item => {
            if(selectedSizes.includes(item.dataset.val)) item.classList.add("selected");
            else item.classList.remove("selected");
        });
        document.getElementById("sizeModal").style.display = "flex";
    }

    function closeSizeModal(){ document.getElementById("sizeModal").style.display = "none"; }

    function saveSize(){
        document.getElementById("size").value = selectedSizes.join("|");
        renderSizePreview();
        closeSizeModal();
    }

    function renderSizePreview() {
        const sp = document.getElementById("sizePreview"); sp.innerHTML = "";
        selectedSizes.forEach(s => {
            const d = document.createElement("div"); d.className = "preview-size-tag"; d.innerText = s; sp.appendChild(d);
        });
    }

    // ==========================================
    // 2. LOGIC XỬ LÝ MÀU SẮC (AUTO GÁN TÊN MÀU THÔNG MINH)
    // ==========================================

    // Thuật toán tìm tên màu Tiếng Việt gần giống nhất dựa trên RGB
    function getClosestColorName(r, g, b) {
        const baseColors = [
            { name: "Đen", r: 0, g: 0, b: 0 },
            { name: "Trắng", r: 255, g: 255, b: 255 },
            { name: "Xám", r: 128, g: 128, b: 128 },
            { name: "Xám nhạt", r: 192, g: 192, b: 192 },
            { name: "Đỏ", r: 255, g: 0, b: 0 },
            { name: "Xanh dương", r: 0, g: 0, b: 255 },
            { name: "Xanh dương nhạt", r: 135, g: 206, b: 235 },
            { name: "Xanh lá", r: 0, g: 255, b: 0 },
            { name: "Xanh lá đậm", r: 0, g: 128, b: 0 },
            { name: "Vàng", r: 255, g: 255, b: 0 },
            { name: "Cam", r: 255, g: 165, b: 0 },
            { name: "Hồng", r: 255, g: 192, b: 203 },
            { name: "Hồng đậm", r: 255, g: 20, b: 147 },
            { name: "Tím", r: 128, g: 0, b: 128 },
            { name: "Tím nhạt", r: 238, g: 130, b: 238 },
            { name: "Nâu", r: 165, g: 42, b: 42 },
            { name: "Be (Beige)", r: 245, g: 245, b: 220 },
            { name: "Xanh ngọc", r: 0, g: 255, b: 255 }
        ];

        let minDistance = Infinity;
        let closestName = "";
        baseColors.forEach(color => {
            // Công thức tính khoảng cách 3D của màu sắc
            const distance = Math.sqrt(Math.pow(r - color.r, 2) + Math.pow(g - color.g, 2) + Math.pow(b - color.b, 2));
            if (distance < minDistance) {
                minDistance = distance;
                closestName = color.name;
            }
        });
        return closestName;
    }

    const colorGrid = document.getElementById("colorGrid");
    const steps = [0, 51, 102, 153, 204, 255];

    // Vòng lặp tạo 216 màu
    for(let r of steps){
        for(let g of steps){
            for(let b of steps){
                const c = `rgb(${r},${g},${b})`;
                const colorName = getClosestColorName(r, g, b);
                const val = `${c}:${colorName}`; // Định dạng lưu: "rgb(255,0,0):Đỏ"

                const div = document.createElement("div");
                div.className = "color-item";
                div.style.background = c;
                div.title = colorName; // Rê chuột vào chấm màu sẽ hiện tên
                div.dataset.val = val;
                div.onclick = () => {
                    div.classList.toggle("selected");
                    if(div.classList.contains("selected")) selectedColors.push(val);
                    else selectedColors = selectedColors.filter(x => x !== val);
                };
                colorGrid.appendChild(div);
            }
        }
    }

    function openColorModal(){
        document.querySelectorAll(".color-item").forEach(item => {
            if(selectedColors.includes(item.dataset.val)) item.classList.add("selected");
            else item.classList.remove("selected");
        });
        document.getElementById("colorModal").style.display = "flex";
    }

    function closeColorModal(){ document.getElementById("colorModal").style.display = "none"; }

    function saveColor(){
        document.getElementById("color").value = selectedColors.join("|");
        renderColorPreview();
        closeColorModal();
    }

    // Hiển thị dạng: (Chấm màu) Tên màu
    function renderColorPreview() {
        const cp = document.getElementById("colorPreview"); cp.innerHTML = "";
        selectedColors.forEach(c => {
            const parts = c.split(':');
            const rgb = parts[0];
            const name = parts[1] || parts[0]; // Nếu sản phẩm cũ không có tên thì lấy tạm rgb

            const d = document.createElement("div");
            d.className = "preview-size-tag";
            d.style.marginRight = "8px";
            d.style.marginBottom = "8px";
            d.innerHTML = `<span style="display:inline-block; width:12px; height:12px; border-radius:50%; background:${rgb}; margin-right:5px; border:1px solid #ccc; vertical-align:middle;"></span>${name}`;
            cp.appendChild(d);
        });
    }

    // ==========================================
    // 3. LOGIC XỬ LÝ ẢNH (ĐÃ FIX LỖI KHÔNG TẢI ĐƯỢC ẢNH)
    // ==========================================
    function openImageModal(){ document.getElementById("imageModal").style.display = "flex"; }
    function closeImageModal(){
        document.getElementById("imageModal").style.display = "none";
        // Reset lại giá trị
        document.getElementById("fileInput").value = "";
        document.getElementById("imgPreview").style.display = "none";
    }

    // Khi người dùng bấm chọn file
    document.getElementById('fileInput').addEventListener('change', function(e) {
        if(e.target.files && e.target.files[0]) {
            let reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('imgPreview').src = e.target.result;
                document.getElementById('imgPreview').style.display = "block";
            }
            reader.readAsDataURL(e.target.files[0]);
            tempImageName = e.target.files[0].name; // Lưu lại tên ảnh
        }
    });

    function saveImage() {
        if(tempImageName) {
            document.getElementById("image").value = tempImageName;
            document.getElementById("preview").src = document.getElementById('imgPreview').src;
            document.getElementById("preview").style.display = "block";
        }
        closeImageModal();
    }

    // ==========================================
    // 4. CLICK VÀO HÀNG ĐỂ SỬA
    // ==========================================
    // ==========================================
    // 4. CLICK VÀO HÀNG ĐỂ SỬA
    // ==========================================
    function selectProduct(row){
        document.getElementById("id").value = row.dataset.id || "";
        document.getElementById("name").value = row.dataset.name || "";
        document.getElementById("price").value = row.dataset.price || "";
        document.getElementById("image").value = row.dataset.image || "";
        document.getElementById("gender").value = row.dataset.gender || "boy";
        document.getElementById("category").value = row.dataset.category || "";

        const preview = document.getElementById("preview");
        if(row.dataset.image){
            // ĐÃ SỬA: Xoá chữ "/images/products/", gán trực tiếp link Cloudinary
            preview.src = row.dataset.image;
            preview.style.display = "block";
        } else {
            preview.style.display = "none";
        }

        selectedColors = row.dataset.color ? row.dataset.color.split("|") : [];
        selectedSizes = row.dataset.size ? row.dataset.size.split("|") : [];

        renderColorPreview();
        renderSizePreview();
    }

    function deleteProduct() {
        const id = document.getElementById("id").value;
        if(id) {
            if(confirm("Xác nhận xoá sản phẩm " + id + "?")) {
                // Thêm logic chuyển hướng API của bạn vào đây
            }
        } else {
            alert("Vui lòng chọn sản phẩm cần xoá ở bảng bên trái!");
        }
    }
    // Hàm hiển thị ảnh xem trước khi vừa chọn file
    function previewNewImage() {
        const file = document.getElementById('imageFile').files[0];
        const preview = document.getElementById('preview');
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }
</script>

</body>
</html>
