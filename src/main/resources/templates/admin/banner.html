<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Banner</title>
    <link rel="stylesheet" href="/css/banner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
<div class="header">
    <div class="logo">
        <img th:src="@{/images/logo.jpg}">
    </div>
    <div class="nav">
        <a href="/admin/home">Home</a>
        <a href="/admin/category">Category</a>
        <a href="/admin/product">Product</a>
        <a href="/admin/order">Order</a>
        <a href="/admin/customer">Customer</a>
        <a href="/admin/voucher">Voucher</a>
        <a href="/admin/banner" class="active">Banner</a>
    </div>
    <div class="right-header">
        <div class="profile">
            <span>Hi <span th:text="${#authentication.name}"></span></span>
        </div>
        <form method="post" action="/logout">
            <button type="submit" class="logout">Logout</button>
        </form>
    </div>
</div>

<h3 class="main-title">Banner Management</h3>

<div class="container">

    <div class="left">
        <h3 class="title">Banner List</h3>
        <table border="1">
            <tr>
                <th style="width: 10%;">ID</th>
                <th>Hình ảnh</th>
            </tr>

            <tr th:each="b : ${banners}"
                th:attr="data-id=${b.id}, data-image=${b.image}"
                onclick="selectBanner(this)">

                <td th:text="${b.id}"></td>
                <td><img th:src="${b.image}" class="banner-img-preview"></td>
            </tr>
            <tr th:if="${banners == null || banners.isEmpty()}">
                <td colspan="2" style="text-align: center; padding: 30px; color: #888;">
                    Chưa có Banner nào!
                </td>
            </tr>
        </table>
    </div>

    <div class="right">
        <h3 class="title">Banner Detail</h3>
        <form method="post" enctype="multipart/form-data">

            <label>ID</label>
            <input type="text" name="id" id="id" readonly placeholder="Auto (Để trống khi thêm mới)">

            <label>Hình ảnh</label>
            <input type="file" name="imageFile" id="imageFile" accept="image/*" style="display: none;" onchange="previewImage()">

            <div class="upload-box" onclick="document.getElementById('imageFile').click()">
                <i class="fa fa-cloud-upload-alt" style="font-size: 35px; color: #4a90e2; margin-bottom: 10px; display: block;"></i>
                <span style="color: #666; font-size: 14px; font-weight: 500;">Click để chọn ảnh mới</span>
                <img id="preview" style="max-width: 100%; margin-top: 15px; border-radius: 8px; display: none;">
            </div>

            <br>

            <button type="submit" formaction="/admin/banner/add">Tạo mới</button>

            <button type="submit" formaction="/admin/banner/update">Sửa</button>

            <button type="button" onclick="deleteBanner()">Xoá</button>

        </form>
    </div>

</div>

<script>
    // Hàm hiển thị thông tin khi Click vào hàng bên trái
    function selectBanner(row){
        const id = row.getAttribute("data-id");
        const imageSrc = row.getAttribute("data-image");

        document.getElementById("id").value = id;

        const preview = document.getElementById("preview");
        if(imageSrc) {
            preview.src = imageSrc;
            preview.style.display = 'block';
        }
    }

    // Hàm Preview ảnh khi chọn file từ máy tính
    function previewImage() {
        const file = document.getElementById('imageFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }

    // Hàm xác nhận Xoá
    function deleteBanner(){
        const id = document.getElementById("id").value;
        if(id === ""){
            alert("Vui lòng chọn Banner ở bảng bên trái trước!");
            return;
        }
        if(confirm("Bạn có chắc chắn muốn xoá Banner này?")){
            window.location.href = "/admin/banner/delete/" + id;
        }
    }
</script>

</body>
</html>
