<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin - Banner Management</title>
    <link rel="stylesheet" href="/css/banner.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="header">
    <div class="logo"><img th:src="@{/images/logo.jpg}" alt="Logo"></div>
    <div class="nav">
        <a href="/admin/home">Home</a>
        <a href="/admin/category">Category</a>
        <a href="/admin/product">Product</a>
        <a href="/admin/order">Order</a>
        <a href="/admin/customer">Customer</a>
        <a href="/admin/voucher">Voucher</a>
        <a href="/admin/banner" class="active">Banner</a>
    </div>
    <div class="right-header">
        <span>Hi <span th:text="${#authentication.name}"></span></span>
        <form method="post" action="/logout" style="margin: 0;">
            <button type="submit" class="logout">Logout</button>
        </form>
    </div>
</div>

<h2 class="title">Banner Management</h2>

<div class="container-full">

    <div class="upload-container">
        <h3 class="upload-title"><i class="fa fa-image me-2"></i> Thêm Banner mới</h3>
        <form action="/admin/banner/add" method="post" enctype="multipart/form-data">

            <input type="file" name="imageFile" id="imageFile" accept="image/*" style="display: none;" onchange="previewImage()" required>

            <div class="upload-box" onclick="document.getElementById('imageFile').click()">
                <i class="fa fa-cloud-upload-alt"></i>
                <p>Click để chọn ảnh Banner từ máy tính</p>
                <img id="preview" alt="Preview Image">
            </div>

            <button type="submit" class="btn-upload"><i class="fa fa-upload"></i> TẢI LÊN CLOUDINARY</button>
        </form>
    </div>

    <div class="list-container">
        <h3 class="upload-title"><i class="fa fa-list me-2"></i> Danh sách Banner hiện tại</h3>
        <table>
            <thead>
            <tr>
                <th style="width: 5%;">ID</th>
                <th style="width: 35%;">Hình ảnh</th>
                <th style="width: 45%;">Link Cloudinary</th>
                <th style="width: 15%; text-align: center;">Hành động</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="b : ${banners}">
                <td th:text="${b.id}"></td>
                <td><img th:src="${b.image}" class="banner-img-preview"></td>
                <td>
                    <a th:href="${b.image}" target="_blank" class="cloud-link" th:text="${b.image}"></a>
                </td>
                <td style="text-align: center;">
                    <a th:href="@{'/admin/banner/delete/' + ${b.id}}" onclick="return confirm('Bạn có chắc chắn muốn xoá banner này không?')" class="btn-delete">
                        <i class="fa fa-trash"></i> Xoá
                    </a>
                </td>
            </tr>
            <tr th:if="${banners == null || banners.isEmpty()}">
                <td colspan="4" style="text-align: center; padding: 40px; color: #888; font-size: 16px;">
                    <i class="fa fa-folder-open" style="font-size: 40px; color: #ddd; display: block; margin-bottom: 10px;"></i>
                    Chưa có Banner nào trên hệ thống!
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    // Script hiển thị ảnh ngay khi admin vừa chọn file xong
    function previewImage() {
        const file = document.getElementById('imageFile').files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    }
</script>
</body>
</html>
