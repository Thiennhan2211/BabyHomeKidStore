<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thanh toán - BabyHome</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/checkout.css}">
</head>
<body>

<div class="checkout-header">
    <a th:href="@{/}"><img th:src="@{/images/logo.jpg}" alt="BabyHome"></a>
</div>

<div class="container" style="max-width: 1100px;">
    <form th:action="@{/checkout}" method="post">
        <input type="hidden" name="voucherCode" th:value="${appliedVoucher}">
        <div class="row">

            <div class="col-md-7">

                <div class="c-card">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <span class="c-title mb-0">Tài khoản</span>
                        <a href="/logout" style="color: #888; text-decoration: none; font-size: 14px;">Đăng xuất</a>
                    </div>
                    <div class="account-box">
                        <div class="d-flex align-items-center gap-3">
                            <div class="avatar-circle"><i class="fa fa-user"></i></div>
                            <div>
                                <div style="font-weight: bold; color: #333;" th:text="${user.fullname != null ? user.fullname : user.username}">Khách hàng</div>
                                <div style="color: #888; font-size: 14px;" th:text="${user.email}">email@example.com</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="c-card">
                    <div class="c-title">Thông tin giao hàng</div>
                    <input type="text" class="form-control" placeholder="Họ và tên" th:value="${user.fullname}" required>
                    <input type="text" name="phone" class="form-control" placeholder="Số điện thoại" th:value="${user.phone}" required>

                    <div class="row">
                        <div class="col-12">
                            <input type="text" name="address" class="form-control" placeholder="Địa chỉ chi tiết (Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/TP)" th:value="${user.address}" required>
                        </div>
                    </div>
                </div>

                <div class="c-card">
                    <div class="c-title">Phương thức thanh toán</div>

                    <label class="payment-method active">
                        <input type="radio" name="payment" value="cod" checked style="width: 18px; height: 18px;">
                        <i class="fa fa-money-bill-wave text-success fs-4"></i>
                        <span style="font-weight: 500;">Thanh toán khi giao hàng (COD)</span>
                    </label>

                    <label class="payment-method" style="opacity: 0.6; cursor: not-allowed;">
                        <input type="radio" name="payment" disabled>
                        <i class="fa fa-credit-card text-primary fs-4"></i>
                        <span>Thanh toán VNPay (ATM/Visa/MasterCard) - Đang bảo trì</span>
                    </label>
                </div>

                <div class="c-card">
                    <div class="c-title">Hóa đơn & Ghi chú</div>
                    <textarea name="note" class="form-control" rows="2" placeholder="Ghi chú đơn hàng (VD: Giao giờ hành chính...)"></textarea>
                </div>

            </div>

            <div class="col-md-5">

                <div class="c-card">
                    <div class="c-title">Giỏ hàng</div>
                    <div style="max-height: 300px; overflow-y: auto; padding-right: 5px;">
                        <div class="cart-item" th:each="item : ${cartItems}">
                            <img th:src="@{/images/products/{img}(img=${item.image})}">
                            <div class="cart-item-info">
                                <div style="font-weight: bold; font-size: 14px; margin-bottom: 5px;" th:text="${item.name}">Tên SP</div>
                                <div style="font-size: 12px; color: #666; background: #f5f5f5; padding: 3px 8px; border-radius: 4px; display: inline-block;" th:text="${item.color} + ' / ' + ${item.size}">Màu / Size</div>
                            </div>
                            <div style="text-align: right;">
                                <div style="font-weight: bold;" th:text="${#numbers.formatDecimal(item.price, 0, 'COMMA', 0, 'POINT')} + 'đ'">Giá</div>
                                <div style="color: #888; font-size: 13px;" th:text="'x' + ${item.quantity}">SL</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="c-card">
                    <div class="c-title">Mã khuyến mãi</div>

                    <div th:if="${appliedVoucher != null and appliedVoucher != ''}"
                         style="display: inline-flex; align-items: center; background: #fff4e6; border: 1px solid #ffd8a8; padding: 8px 15px; border-radius: 8px; width: 100%; box-sizing: border-box;">
                        <i class="fa fa-gift me-2" style="color: #f59f00; font-size: 18px;"></i>
                        <span style="color: #d97706; font-weight: bold; margin-right: auto; font-size: 15px;" th:text="${appliedVoucher}">BABYHOME</span>

                        <a href="/checkout" style="color: #aaa; text-decoration: none; font-size: 22px; font-weight: bold; line-height: 1; cursor: pointer; transition: 0.2s;" onmouseover="this.style.color='#dc3545'" onmouseout="this.style.color='#aaa'">&times;</a>
                    </div>

                    <div th:if="${appliedVoucher == null or appliedVoucher == ''}" class="d-flex gap-2">
                        <input type="text" id="manualVoucher" class="form-control mb-0" placeholder="Nhập mã khuyến mãi">
                        <button type="button" class="btn btn-submit px-4" style="padding: 10px 20px; font-size: 15px;" onclick="applyManualVoucher()">Áp dụng</button>
                    </div>
                </div>

                <div class="c-card">
                    <div class="c-title">Tóm tắt đơn hàng</div>

                    <div class="d-flex justify-content-between mb-2">
                        <span style="color: #666;">Tổng tiền hàng</span>
                        <span style="font-weight: 500;" th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>

                    <div class="d-flex justify-content-between mb-3">
                        <span style="color: #666;">Phí vận chuyển</span>
                        <span style="font-weight: 500; color: #28a745;">Miễn phí</span>
                    </div>

                    <div th:if="${appliedVoucher != null and appliedVoucher != ''}" class="d-flex justify-content-between mb-3 pb-3 border-bottom">
                        <span style="color: #666;">Mã <span th:text="'[' + ${appliedVoucher} + ']'" style="color: #4a90e2; font-weight: bold; margin-left: 5px;"></span>:</span>
                        <span class="fw-bold text-danger" th:text="${discount > 0 ? '-' + #numbers.formatDecimal(discount, 0, 'COMMA', 0, 'POINT') + 'đ' : 'Miễn phí'}">-0đ</span>
                    </div>

                    <div th:if="${appliedVoucher == null or appliedVoucher == ''}" class="border-bottom mb-3 pb-2"></div>

                    <div class="d-flex justify-content-between mb-4 mt-2">
                        <span class="fw-bold fs-5">Tổng thanh toán</span>
                        <span class="fw-bold fs-4 text-danger" th:text="${#numbers.formatDecimal(finalPrice, 0, 'COMMA', 0, 'POINT')} + 'đ'">0đ</span>
                    </div>

                    <button type="submit" class="btn btn-submit w-100">Đặt hàng</button>
                </div>

            </div>

        </div>
    </form>
</div>
<script>
    // Hàm giúp khách hàng tự gõ mã ở trang Checkout
    function applyManualVoucher() {
        var code = document.getElementById('manualVoucher').value;
        if(code.trim() !== '') {
            // Tải lại trang và truyền mã vừa gõ lên máy chủ
            window.location.href = '/checkout?voucher=' + code.trim().toUpperCase();
        }
    }
</script>
</body>
</html>
