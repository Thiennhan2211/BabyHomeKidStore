<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title th:text="${product.name} + ' - BabyHome Kids Store'">Chi tiết sản phẩm</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="/css/styleindex.css">
    <link rel="stylesheet" href="/css/product-detail.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Sửa lỗi hover phần sản phẩm khác */
        .products .product {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .products .product:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.15) !important;
        }
        .color-btn {
            display: inline-block;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            box-shadow: 0 0 0 1px #ddd;
        }
        .btn-check-color:checked + .color-btn {
            border: 2px solid white;
            box-shadow: 0 0 0 2px #4a90e2;
            transform: scale(1.1);
        }
    </style>
</head>

<body>
<div id="toastMessage" class="custom-toast">
    <i class="fa fa-check-circle fs-5"></i> <span>Đã thêm vào giỏ hàng!</span>
</div>

<header class="header">
    <div class="logo"><a th:href="@{/}"><img th:src="@{/images/logo.jpg}"></a></div>
</header>

<div class="container mt-4" style="margin-bottom: 50px;">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/}">Trang chủ</a></li>
            <li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Tên sản phẩm</li>
        </ol>
    </nav>

    <div class="product-detail-container">
        <div class="row">
            <div class="col-md-5 text-center position-relative">
                <img th:src="@{/images/products/{img}(img=${product.image})}" class="img-fluid rounded" alt="Hình sản phẩm" style="max-height: 500px; object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
            </div>

            <div class="col-md-7 ps-md-5">
                <h1 class="fw-bold mb-2" th:text="${product.name}">Tên sản phẩm</h1>
                <div class="mb-3 text-warning" style="font-size: 16px;">
                    <i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i><i class="fa fa-star"></i>
                    <span class="text-dark fw-bold ms-2">5.0</span>
                    <span class="text-muted ms-2">(15 Đánh giá) | Đã bán: 102</span>
                </div>
                <p class="text-muted mb-2">Mã sản phẩm: <span class="fw-bold" th:text="${product.id}">123</span> | Danh mục: <span class="fw-bold" th:text="${product.category != null ? product.category : 'Thời trang'}">Thời trang</span></p>

                <div class="price-box">
                    <p class="product-price" th:text="${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'">199,000 ₫</p>
                </div>

                <form onsubmit="addToCartDetail(event)">
                    <input type="hidden" name="productId" th:value="${product.id}">

                    <div class="mb-4 mt-4" th:if="${product.color != null and !product.color.isEmpty()}">
                        <label class="fw-bold mb-3 d-block text-uppercase text-muted" style="font-size: 13px;">Chọn màu sắc:</label>
                        <div class="color-options">
                            <th:block th:each="c, stat : ${#strings.arraySplit(product.color, '|')}">
                                <input type="radio" class="btn-check btn-check-color" name="color"
                                       th:id="'color_' + ${stat.index}"
                                       th:value="${c}"
                                       autocomplete="off"
                                       th:checked="${stat.index == 0}">
                                <label class="color-btn auto-color" th:for="'color_' + ${stat.index}" th:data-color="${c}"></label>
                            </th:block>
                        </div>
                    </div>

                    <div class="mb-4 mt-4" th:if="${product.size != null and !product.size.isEmpty()}">
                        <label class="fw-bold mb-3 d-block text-uppercase text-muted" style="font-size: 13px;">Chọn kích thước:</label>
                        <div class="size-options">
                            <th:block th:each="s, stat : ${#strings.arraySplit(product.size, '|')}">
                                <input type="radio" class="btn-check" name="size"
                                       th:id="'size_' + ${stat.index}"
                                       th:value="${s}"
                                       autocomplete="off"
                                       th:checked="${stat.index == 0}"> <label class="size-btn" th:for="'size_' + ${stat.index}" th:text="${s}"></label>
                            </th:block>
                        </div>
                    </div>

                    <div class="mb-5 d-flex align-items-center">
                        <label class="fw-bold me-4 text-uppercase text-muted" style="font-size: 13px;">Số lượng:</label>
                        <div class="qty-wrapper">
                            <button type="button" class="btn-qty" onclick="decreaseQty()">-</button>
                            <input type="number" id="qtyInput" name="quantity" class="input-qty" value="1" min="1" max="50">
                            <button type="button" class="btn-qty" onclick="increaseQty()">+</button>
                        </div>
                    </div>

                    <button type="submit" class="btn-add-to-cart w-100 mb-3"><i class="fa fa-shopping-cart me-2"></i> THÊM VÀO GIỎ HÀNG</button>
                </form>
            </div>
        </div>
    </div>

    <div class="product-detail-container mt-4">
        <h3 class="fw-bold mb-4 border-bottom pb-3 text-uppercase fs-5">Các sản phẩm khác</h3>
        <div class="products" style="display: flex; flex-wrap: wrap; justify-content: flex-start; gap: 20px;">
            <div class="product" th:each="related : ${relatedProducts}" style="width: 23%; min-width: 200px; border-radius: 12px; overflow: hidden; background: white; box-shadow: 0 2px 8px rgba(0,0,0,0.08);">
                <div class="product-img" style="position: relative; overflow: hidden;">
                    <a th:href="@{/product/{slug}/{id}(slug=${related.slug}, id=${related.id})}">
                        <img th:src="@{/images/products/{img}(img=${related.image})}" alt="Hình sản phẩm" style="width: 100%; height: 200px; object-fit: cover;">
                    </a>
                </div>
                <div style="padding: 15px;">
                    <h3 class="mt-2" style="font-size: 15px; margin-bottom: 5px; height: 40px; overflow: hidden;">
                        <a th:href="@{/product/{slug}/{id}(slug=${related.slug}, id=${related.id})}" style="text-decoration: none; color: #333;" th:text="${related.name}">Tên SP</a>
                    </h3>
                    <p class="fw-bold text-danger m-0" th:text="${#numbers.formatDecimal(related.price, 0, 'COMMA', 0, 'POINT')} + ' ₫'"></p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // TỰ ĐỘNG PHIÊN DỊCH MÀU SẮC TỪ TIẾNG VIỆT SANG MÃ MÀU CSS
    document.addEventListener("DOMContentLoaded", function() {
        const colorDictionary = {
            'trắng': '#FFFFFF', 'đen': '#000000', 'đỏ': '#FF0000', 'xanh dương': '#1E90FF',
            'xanh lá': '#32CD32', 'vàng': '#FFD700', 'hồng': '#FFB6C1', 'cam': '#FFA500',
            'xám': '#808080', 'nâu': '#8B4513', 'tím': '#8A2BE2'
        };

        document.querySelectorAll('.auto-color').forEach(label => {
            let colorName = label.getAttribute('data-color').trim().toLowerCase();

            // Nếu là mã màu RGB có sẵn thì giữ nguyên
            if(colorName.startsWith('rgb') || colorName.startsWith('#')) {
                label.style.backgroundColor = colorName;
            }
            // Nếu là tiếng Việt thì dịch ra màu
            else if (colorDictionary[colorName]) {
                label.style.backgroundColor = colorDictionary[colorName];
                // Thêm viền xám cho màu trắng để dễ nhìn
                if (colorName === 'trắng') label.style.border = '1px solid #ccc';
            } else {
                // Nếu màu lạ quá không biết, cho màu mặc định là xám nhạt
                label.style.backgroundColor = '#e0e0e0';
            }
        });
    });

    // Các hàm Số lượng và Add to Cart giữ nguyên
    function increaseQty() {
        let input = document.getElementById('qtyInput');
        let currentVal = parseInt(input.value);
        if (!isNaN(currentVal) && currentVal < 50) { input.value = currentVal + 1; }
    }
    function decreaseQty() {
        let input = document.getElementById('qtyInput');
        let currentVal = parseInt(input.value);
        if (!isNaN(currentVal) && currentVal > 1) { input.value = currentVal - 1; }
    }
    // ...
</script>
</body>
</html>
